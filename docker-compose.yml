services:
  bridge:
    # Paper + AgentBridge + CoreProtect をまとめた開発用サーバー
    image: itzg/minecraft-server:java21
    working_dir: /data
    environment:
      EULA: "TRUE"
      TYPE: "PAPER"
      VERSION: ${MC_VERSION:-1.21.1}
      ONLINE_MODE: "FALSE"
      ENABLE_RCON: "false"
      MEMORY: ${BRIDGE_JVM_MEMORY:-2G}
      INIT_MEMORY: ${BRIDGE_JVM_INIT_MEMORY:-1G}
      JVM_OPTS: ${BRIDGE_JVM_OPTS:-}
    volumes:
      - ./bridge-data:/data
      # AgentBridge と CoreProtect は shadowJar 実行時に build/libs へ集約されるため、
      # Paper イメージ標準のプラグインコピー機構（/plugins -> /data/plugins）を使う。
      # /data/plugins は Paper がリマップ用の作業ディレクトリを生成するため書き込み可が必須。
      - ./bridge-plugin/build/libs:/plugins:ro
    ports:
      # 外部から Paper へ直接入る必要がある場合のみ 25565 を開ける。
      # - "25566:25565"  # ホスト側ポートをずらす例
      # - "19071:19071"
      # ホストで Paper を使い続けたい場合は、Compose 側の公開ポートをずらす（例: "19072:19071"）か、bridge サービスを起動しない運用に切り替えてください。
      - "19072:19071"
    healthcheck:
      test: ["CMD-SHELL", "bash -lc '</dev/tcp/127.0.0.1/19071'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    restart: unless-stopped

  node-bot:
    # TypeScript ソースをウォッチしながら Mineflayer ボットを再起動する開発用サービス
    build:
      context: .
      dockerfile: node-bot/Dockerfile
    working_dir: /app/node-bot
    volumes:
      - ./node-bot:/app/node-bot
    env_file:
      - .env
    environment:
      # Mineflayer が Paper と揃った既定バージョンで起動するよう docker-compose 側でもフォールバックを指定する。
      MC_VERSION: ${MC_VERSION:-1.21.1}
      MC_HOST: ${COMPOSE_MC_HOST:-bridge}
      WS_HOST: ${WS_HOST:-0.0.0.0}
      WS_PORT: ${WS_PORT:-8765}
      AGENT_WS_URL: ${COMPOSE_AGENT_WS_URL:-ws://python-agent:${AGENT_WS_PORT:-9000}}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://host.docker.internal:4318}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-mc-node-bot}
      OTEL_RESOURCE_ENVIRONMENT: ${OTEL_RESOURCE_ENVIRONMENT:-development}
      OTEL_TRACES_SAMPLER_RATIO: ${OTEL_TRACES_SAMPLER_RATIO:-1.0}
      AGENT_BRIDGE_LOG_LEVEL: ${AGENT_BRIDGE_LOG_LEVEL:-warn}
      AGENT_LOG_LEVEL: ${AGENT_LOG_LEVEL:-warn}
    command: ["npm", "run", "dev"]
    ports:
      - "8765:8765"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "const net=require('node:net');const s=net.connect({host:'127.0.0.1',port:8765},()=>{s.end();process.exit(0)});s.on('error',()=>process.exit(1));"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    stdin_open: true
    tty: true
    depends_on:
      bridge:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./node-bot
          target: /app/node-bot
          ignore:
            - node_modules/
            - dist/
        - action: rebuild
          path: ./node-bot/package-lock.json

  python-agent:
    # Python エージェントを watchfiles で自動再実行する開発用サービス
    build:
      context: .
      dockerfile: python/Dockerfile
    working_dir: /app
    volumes:
      - ./python:/app/python
      - ./tests:/app/tests
      - ./contracts:/app/contracts
    env_file:
      - .env
    environment:
      # Node 側が公開する WebSocket ポートを 1 箇所で可変化し、複数環境での疎通設定を単純化する。
      WS_URL: ${COMPOSE_WS_URL:-ws://node-bot:${WS_PORT:-8765}}
      AGENT_WS_HOST: ${AGENT_WS_HOST:-0.0.0.0}
      AGENT_WS_PORT: ${AGENT_WS_PORT:-9000}
      BRIDGE_URL: ${COMPOSE_BRIDGE_URL:-http://bridge:19071}
      WATCHFILES_FORCE_POLLING: "true"
    command:
      - watchfiles
      - --filter
      - python
      - --ignore-paths
      - .venv
      - --
      - python -m mc_bot_agent_entrypoint
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import socket; s=socket.create_connection(('127.0.0.1', 9000), 2); s.close()"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    stdin_open: true
    tty: true
    depends_on:
      bridge:
        condition: service_healthy
      node-bot:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./python
          target: /app/python
        - action: sync
          path: ./tests
          target: /app/tests
        - action: sync
          path: ./contracts
          target: /app/contracts
        - action: rebuild
          path: ./requirements.txt
        - action: rebuild
          path: ./constraints.txt
        - action: rebuild
          path: ./pyproject.toml
